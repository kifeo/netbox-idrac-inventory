name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check netbox_idrac_inventory

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in step with min_version / max_version in the PluginConfig.
        netbox-version: ["v4.2.9", "v4.3.7", "v4.4.10", "v4.5.10", "v4.6.4"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
          POSTGRES_DB: netbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netbox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin
      - uses: actions/checkout@v4
        with:
          repository: netbox-community/netbox
          ref: ${{ matrix.netbox-version }}
          path: netbox
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: netbox/requirements.txt
      - name: Install NetBox and the plugin
        run: |
          pip install -r netbox/requirements.txt
          pip install -e plugin
      - name: Configure NetBox
        run: cp plugin/.github/ci_configuration.py netbox/netbox/netbox/configuration.py
      - name: Run plugin tests
        working-directory: netbox/netbox
        run: python manage.py test netbox_idrac_inventory -v 2
