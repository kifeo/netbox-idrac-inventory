[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "netbox-idrac-inventory"
version = "0.2.0"
description = "NetBox plugin to synchronize Dell servers with NetBox via iDRAC Redfish"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Thomas Le Gentil", email = "thomas.legentil@gmail.com" }]
keywords = ["netbox", "netbox-plugin", "dell", "idrac", "redfish"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Django",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "sushy>=5.0.0",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-django",
    "responses",
]

[project.urls]
Homepage = "https://github.com/tlegentil/netbox-idrac-inventory"

[tool.setuptools.packages.find]
include = ["netbox_idrac_inventory*"]

[tool.setuptools.package-data]
netbox_idrac_inventory = ["templates/**/*.html"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Generated by makemigrations; don't hold it to the line-length rule.
"netbox_idrac_inventory/migrations/*" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["netbox_idrac_inventory"]
# Django/NetBox app imports (dcim, ipam, extras…) resolve at runtime inside
# NetBox; keep them grouped with third-party rather than flagged unknown.

